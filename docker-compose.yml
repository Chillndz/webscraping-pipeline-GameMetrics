name: gamemetrics
services:

  db:
    image: postgres:16-alpine
    container_name: gamemetrics_db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gamemetrics_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gamemetrics_api
    command: python api/app.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379/0
      FLASK_DEBUG:  ${FLASK_DEBUG}
      # PYTHONPATH = racine du projet pour que "from api.xxx" et "from tasks.xxx" fonctionnent
      PYTHONPATH:   /app
    volumes:
      - ./data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gamemetrics_celery_worker
    command: celery -A tasks.celery_worker worker --loglevel=info -Q scraping,cleaning,default
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379/0
      PYTHONPATH:   /app
    volumes:
      - ./data:/app/data
      - ./scraper:/app/scraper
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gamemetrics_celery_beat
    command: celery -A tasks.celery_worker beat --loglevel=info
    environment:
      REDIS_URL:  redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      - redis
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: gamemetrics_prometheus
    volumes:
      # CORRECTION : prometheus.yml en minuscule (Linux est case-sensitive)
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: gamemetrics_grafana
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_INSTALL_PLUGINS:         "grafana-piechart-panel"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/gamemetrics.json
    volumes:
      - grafana_data:/var/lib/grafana
      # CORRECTION : un seul chemin de provisioning, structure propre
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
